<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#20222f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#2c2e42" stroke-width="1"/>
    </pattern>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>
  <rect x="0" y="314" width="1200" height="6" fill="url(#accent)"/>

  <!-- glow behind the face scan icon -->
  <circle cx="185" cy="160" r="150" fill="url(#glow)"/>

  <!-- Face-scan icon -->
  <g filter="url(#softglow)">
    <circle cx="185" cy="160" r="90" fill="none" stroke="#7aa2f7" stroke-width="2" stroke-dasharray="4 6" opacity="0.6"/>
    <path d="M140 130 Q140 90 185 90 Q230 90 230 130 L230 175 Q230 215 185 220 Q140 215 140 175 Z"
          fill="none" stroke="#c0caf5" stroke-width="2.5"/>
    <circle cx="163" cy="140" r="4" fill="#7aa2f7"/>
    <circle cx="207" cy="140" r="4" fill="#7aa2f7"/>
    <path d="M170 185 Q185 197 200 185" fill="none" stroke="#c0caf5" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="185" y1="150" x2="185" y2="172" stroke="#c0caf5" stroke-width="2" opacity="0.7"/>

    <!-- scan line animation -->
    <line x1="130" y1="95" x2="240" y2="95" stroke="#bb9af7" stroke-width="2.5" opacity="0.9">
      <animate attributeName="y1" values="95;225;95" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="95;225;95" dur="3.2s" repeatCount="indefinite"/>
    </line>

    <!-- corner brackets -->
    <path d="M95 100 L95 80 L115 80" fill="none" stroke="#7aa2f7" stroke-width="3"/>
    <path d="M275 100 L275 80 L255 80" fill="none" stroke="#7aa2f7" stroke-width="3"/>
    <path d="M95 220 L95 240 L115 240" fill="none" stroke="#7aa2f7" stroke-width="3"/>
    <path d="M275 220 L275 240 L255 240" fill="none" stroke="#7aa2f7" stroke-width="3"/>
  </g>

  <!-- Divider -->
  <line x1="380" y1="55" x2="380" y2="265" stroke="#2c2e42" stroke-width="1.5"/>

  <!-- Text content -->
  <text x="415" y="115" font-family="Fira Code, Consolas, monospace" font-size="34" font-weight="700" fill="#c0caf5">face_id_project</text>
  <text x="415" y="150" font-family="Fira Code, Consolas, monospace" font-size="16" fill="#7aa2f7">Face Recognition &amp; Identity Verification System</text>

  <text x="415" y="188" font-family="Segoe UI, sans-serif" font-size="14.5" fill="#a9b1d6">Computer vision meets cybersecurity — real-time facial</text>
  <text x="415" y="210" font-family="Segoe UI, sans-serif" font-size="14.5" fill="#a9b1d6">recognition for reliable, automated identity verification.</text>

  <!-- tech badges -->
  <g font-family="Fira Code, Consolas, monospace" font-size="13" font-weight="600">
    <rect x="415" y="235" width="72" height="28" rx="6" fill="#252739" stroke="#3b3d54"/>
    <text x="451" y="253" fill="#7aa2f7" text-anchor="middle">Python</text>

    <rect x="497" y="235" width="78" height="28" rx="6" fill="#252739" stroke="#3b3d54"/>
    <text x="536" y="253" fill="#bb9af7" text-anchor="middle">OpenCV</text>

    <rect x="585" y="235" width="76" height="28" rx="6" fill="#252739" stroke="#3b3d54"/>
    <text x="623" y="253" fill="#9ece6a" text-anchor="middle">Tkinter</text>

    <rect x="671" y="235" width="72" height="28" rx="6" fill="#252739" stroke="#3b3d54"/>
    <text x="707" y="253" fill="#e0af68" text-anchor="middle">NumPy</text>
  </g>
</svg>
